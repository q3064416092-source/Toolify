server:
  port: 8000
  host: 0.0.0.0
  timeout: 180
upstream_services:
- name: openai
  base_url: https://api.openai.com/v1
  api_key: your-openai-api-key-here
  description: OpenAI Official Service
  is_default: true
  api_format: openai
  models:
  - gpt-3.5-turbo
  - gpt-4
  - gpt-4o
  - gpt-4o-mini
client_authentication:
  allowed_keys:
  - sk-pwd
features:
  enable_function_calling: true
  log_level: INFO
  convert_developer_to_system: true
  key_passthrough: false
  model_passthrough: false
  tool_result_style: xml
  stream_keepalive_seconds: 0
  force_streaming_for_non_stream_requests: false
  enable_fc_error_retry: false
  fc_error_retry_max_attempts: 3
  prompt_template: null
  fc_error_retry_prompt_template: null
